name: CI/CD Pipeline

on:
  push:
    branches:
      - 'feature/**'
      - main
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'test'
        type: choice
        options:
          - dev
          - test
          - prod

jobs:
  terraform:
    name: Terraform Deploy
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
    env:
      AWS_REGION: eu-west-2
      ENV: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
    defaults:
      run:
        working-directory: terraform/env/${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || github.ref == 'refs/heads/main' && 'prod' || 'dev' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform Init
        run: terraform init -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Plan
        run: terraform plan -var="alert_email=${{ secrets.ALERT_EMAIL }}"

      - name: Terraform Apply
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: terraform apply -auto-approve -var="alert_email=${{ secrets.ALERT_EMAIL }}"

      - name: Notify on pipeline failure
        if: failure()
        run: |
          aws sns publish \
            --topic-arn "arn:aws:sns:eu-west-2:602340147234:oil-surveillance-alerts-dev" \
            --subject "[PIPELINE FAILURE] CI/CD Pipeline Failed" \
            --message "Pipeline failed on branch: ${{ github.ref_name }}. Run ID: ${{ github.run_id }}. Check: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    needs: terraform
    if: github.event_name == 'push'
    environment: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
    env:
      AWS_REGION: eu-west-2
      ENV: ${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push to ECR
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/oil-surveillance-${{ env.ENV }}:$IMAGE_TAG .
          docker push $REGISTRY/oil-surveillance-${{ env.ENV }}:$IMAGE_TAG
